- name: Install pyenv dependecies
  apt:
    pkg:
      - make
      - build-essential
      - libssl-dev
      - zlib1g-dev
      - libbz2-dev
      - libreadline-dev
      - libsqlite3-dev
      - llvm
      - libncurses5-dev
      - libncursesw5-dev
      - xz-utils
      - tk-dev
      - libffi-dev
      - liblzma-dev
    state: latest
    update_cache: true
  become: true

- name: Register pyenv install
  stat:
    path: "{{ ansible_user_dir }}/.pyenv"
  register: pyenv_dir

- name: Install PyEnv
  script:
    cmd: pyenv-installer
  when: not pyenv_dir.stat.exists


