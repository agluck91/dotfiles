live_config_reload: true
env:
  TERM: xterm-256color
window:
  startup_mode: "Maximized"
  padding:
   x: 5
   y: 5
  dynamic_padding: false
  decorations: buttonless

hide_cursor_when_typing: true
font:
  normal:
    family: "MesloLGS NF"
    style: Regular
  italic:
    family: "MesloLGS NF"
    style: Italic
  bold:
    family: "MesloLGS NF"
    style: Bold
  bold_italic:
    family: "MesloLGS NF"
    style: Bold Italic
  size: 12.0
key_bindings:
  - { key: C, mods: Command|Shift, chars: "\x02\x20" } # enter thumb mode
  - { key: F, mods: Command, chars: ":Grep\n" } # open file manager 'gokcehan/lf'
  - { key: G, mods: Command, chars: "\x02g" } # open git manager 'jesseduffield/lazygit'F
  - { key: G, mods: Command|Shift, chars: "\x02G" } # open github dash 'dlvhdr/gh-dash'
  - { key: J, mods: Command, chars: "\x02\x54" } # open t - tmux smart session manager
  - { key: Period, mods: Command, chars: ":ZenMode\n" } # toggle zen mode
  - { key: Y, mods: Command, action: "ToggleFullscreen" }

import:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
