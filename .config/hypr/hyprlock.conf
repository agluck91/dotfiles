source = $HOME/.config/hypr/config/mocha.conf

$accent      = $mauve
$accentAlpha = $mauveAlpha
$font        = JetBrainsMono Nerd Font

# GENERAL
general {
  disable_loading_bar = true
  hide_cursor          = true
  grace                = 0
  no_fade_in           = false
}

# BACKGROUND
background {
  monitor    =
  path       = screenshot
  blur_passes = 3
  blur_size   = 7
  brightness  = 0.65
  vibrancy    = 0.15
}

# ─── TIME ────────────────────────────────────────────────────────────────────

label {
  monitor     =
  text        = $TIME
  color       = $text
  font_size   = 100
  font_family = $font Bold
  shadow_passes = 3
  shadow_size   = 5
  shadow_color  = rgba(11111b88)
  position    = 0, 130
  halign      = center
  valign      = center
}

# ─── DATE ────────────────────────────────────────────────────────────────────

label {
  monitor     =
  text        = cmd[update:43200000] date +"%A, %B %d"
  color       = $subtext1
  font_size   = 20
  font_family = $font
  shadow_passes = 2
  shadow_size   = 3
  shadow_color  = rgba(11111b88)
  position    = 0, 55
  halign      = center
  valign      = center
}

# ─── GREETING ────────────────────────────────────────────────────────────────

label {
  monitor     =
  text        = cmd[update:60000] echo "Good $(case $(date +%H) in [0-9]|0[0-9]|1[01]) echo morning;; 1[2-6]) echo afternoon;; *) echo evening;; esac), Andrew"
  color       = $subtext0
  font_size   = 15
  font_family = $font Italic
  shadow_passes = 2
  shadow_size   = 3
  shadow_color  = rgba(11111b88)
  position    = 0, 10
  halign      = center
  valign      = center
}

# ─── INPUT FIELD ─────────────────────────────────────────────────────────────

input-field {
  monitor          =
  size             = 380, 55
  rounding         = 14
  outline_thickness = 2
  dots_size        = 0.28
  dots_spacing     = 0.2
  dots_center      = true
  dots_rounding    = -1
  outer_color      = $accent
  inner_color      = rgba(1e1e2ecc)
  font_color       = $text
  fade_on_empty    = true
  placeholder_text = <span foreground="##$overlay1Alpha">  Enter password</span>
  hide_input       = false
  check_color      = $teal
  fail_color       = $red
  fail_text        = <i>$FAIL <b>($ATTEMPTS)</b></i>
  fail_transition  = 300
  capslock_color   = $yellow
  position         = 0, -80
  halign           = center
  valign           = center
}
