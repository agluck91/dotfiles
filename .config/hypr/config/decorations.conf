# ┃                    Decorations Configuration                ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/mocha.conf

# https://wiki.hyprland.org/Configuring/Variables/#decoration

decoration {
    active_opacity   = 1.0
    inactive_opacity = 0.93
    rounding         = 8
    dim_inactive     = true
    dim_strength     = 0.25

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        size              = 12
        passes            = 3
        noise             = 0.02
        contrast          = 0.9
        brightness        = 0.9
        xray              = true
        special           = true
        new_optimizations = true
    }

    # https://wiki.hyprland.org/Configuring/Variables/#shadow
    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(1e1e2ecc)
    }

}
