# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                    Animations Configuration                 ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# https://wiki.hyprland.org/Configuring/Animations/

animations {
    enabled = true

    bezier = linear,       0.0,  0.0,  1.0,  1.0
    bezier = overshot,     0.13, 0.99, 0.29, 1.1
    bezier = easeOutExpo,  0.16, 1.0,  0.3,  1.0
    bezier = easeOutQuint, 0.22, 1.0,  0.36, 1.0
    bezier = spring,       0.68, -0.55, 0.27, 1.55

    animation = windowsIn,        1, 4, easeOutExpo,  popin 85%
    animation = windowsOut,       1, 4, easeOutQuint, popin 80%
    animation = windowsMove,      1, 4, easeOutExpo,  slide
    animation = border,           1, 3, linear
    animation = borderangle,      1, 40, linear, loop
    animation = fadeIn,           1, 4, easeOutQuint
    animation = fadeOut,          1, 3, easeOutQuint
    animation = fadeDim,          1, 4, easeOutQuint
    animation = workspacesIn,     1, 7, overshot,     slide
    animation = workspacesOut,    1, 5, easeOutExpo,  slidefade 75%
    animation = specialWorkspace, 1, 5, spring,       slidevert
}
